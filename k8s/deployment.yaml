# ═══════════════════════════════════════════════════════════════
#  Chat Distribuido HA — Manifiestos Kubernetes/MicroShift
#  Archivo: k8s/deployment.yaml
#
#  Recursos definidos:
#    1. Namespace        — Aislamiento del proyecto
#    2. StatefulSet      — 2 pods con nombres estables (chat-distribuido-0, chat-distribuido-1)
#                         → Nodo 2 (Réplica Principal), Nodo 3 (Redundancia)
#    3. Service          — Balanceo de carga interno
#    4. Route (opcional) — Exposición externa en MicroShift/OpenShift
# ═══════════════════════════════════════════════════════════════

---
# ── 1. NAMESPACE ─────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: chat-ha
  labels:
    app.kubernetes.io/name: chat-distribuido
    app.kubernetes.io/part-of: sistemas-distribuidos

---
# ── 2. STATEFULSET ─────────────────────────────────────────────
# StatefulSet da nombres estables y ordinales a los pods:
#   chat-distribuido-0  → Nodo 2 (Réplica Principal)
#   chat-distribuido-1  → Nodo 3 (Redundancia)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chat-distribuido
  namespace: chat-ha
  labels:
    app: chat-distribuido
    version: "1.0"
spec:
  serviceName: chat-distribuido-svc
  replicas: 2

  selector:
    matchLabels:
      app: chat-distribuido

  # Estrategia de actualización sin downtime
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0

  template:
    metadata:
      labels:
        app: chat-distribuido
        version: "1.0"
    spec:
      # Distribuir pods en distintos nodos si hay varios
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - chat-distribuido
              topologyKey: kubernetes.io/hostname

      containers:
      - name: chat-server
        image: localhost/chat-distribuido:latest
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 3000
          protocol: TCP

        env:
        - name: PORT
          value: "3000"
        - name: HOST
          value: "0.0.0.0"
        - name: NODE_ENV
          value: "production"
        - name: CLIENT_DIR
          value: "/app/client"
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid

        # ── Probes de Kubernetes ──────────────────────
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
          timeoutSeconds: 5

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 2
          timeoutSeconds: 3

        startupProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 3
          failureThreshold: 10

        # ── Límites de recursos ───────────────────────
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
# ── 3. SERVICE ────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: chat-distribuido-svc
  namespace: chat-ha
  labels:
    app: chat-distribuido
spec:
  type: NodePort
  selector:
    app: chat-distribuido
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 3000
    nodePort: 30080

---
# ── 4. ROUTE (OpenShift/MicroShift) ──────────────────────────
# Equivalente a un Ingress pero nativo de OpenShift
# Expone la app con una URL amigable
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: chat-distribuido-route
  namespace: chat-ha
  labels:
    app: chat-distribuido
spec:
  to:
    kind: Service
    name: chat-distribuido-svc
  port:
    targetPort: http
  # Descomentar para forzar HTTPS:
  # tls:
  #   termination: edge
  #   insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
