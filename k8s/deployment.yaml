# ═══════════════════════════════════════════════════════════════
#  Chat Distribuido HA — Manifiestos Kubernetes/MicroShift
#  Archivo: k8s/deployment.yaml
#
#  Recursos definidos:
#    1. Namespace        — Aislamiento del proyecto
#    2. Deployment       — 2 réplicas del servidor de chat
#    3. Service          — Balanceo de carga interno
#    4. Route (opcional) — Exposición externa en MicroShift/OpenShift
# ═══════════════════════════════════════════════════════════════

---
# ── 1. NAMESPACE ─────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: chat-ha
  labels:
    app.kubernetes.io/name: chat-distribuido
    app.kubernetes.io/part-of: sistemas-distribuidos

---
# ── 2. DEPLOYMENT ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-distribuido
  namespace: chat-ha
  labels:
    app: chat-distribuido
    version: "1.0"
spec:
  # 2 réplicas = Alta Disponibilidad básica
  replicas: 2

  selector:
    matchLabels:
      app: chat-distribuido

  # Estrategia de actualización sin downtime
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # Siempre hay al menos 1 pod disponible
      maxSurge: 1         # Permite 1 pod extra durante la actualización

  template:
    metadata:
      labels:
        app: chat-distribuido
        version: "1.0"
    spec:
      # Distribuir pods en distintos nodos si hay varios
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - chat-distribuido
              topologyKey: kubernetes.io/hostname

      containers:
      - name: chat-server
        # Imagen construida desde la raíz del proyecto:
        #   podman build -t chat-distribuido:latest -f server/Dockerfile .
        #
        # Para MicroShift con registro interno (sin acceso a internet):
        #   image: image-registry.openshift-image-registry.svc:5000/chat-ha/chat-distribuido:latest
        #
        # Para desarrollo local con Podman (sin registro):
        #   Usar imagePullPolicy: Never y cargar la imagen en el daemon de MicroShift
        image: localhost/chat-distribuido:latest
        imagePullPolicy: IfNotPresent  # No intenta descargar si ya existe localmente

        ports:
        - name: http
          containerPort: 3000
          protocol: TCP

        env:
        - name: PORT
          value: "3000"
        - name: HOST
          value: "0.0.0.0"
        - name: NODE_ENV
          value: "production"
        - name: CLIENT_DIR
          value: "/app/client"
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name   # El nombre del Pod como hostname

        # ── Probes de Kubernetes ──────────────────────
        # Liveness: reinicia el pod si el servidor no responde
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
          timeoutSeconds: 5

        # Readiness: solo envía tráfico si el pod está listo
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 2
          timeoutSeconds: 3

        # Startup: da más tiempo en el arranque inicial
        startupProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 3
          failureThreshold: 10

        # ── Límites de recursos ───────────────────────
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"

---
# ── 3. SERVICE ────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: chat-distribuido-svc
  namespace: chat-ha
  labels:
    app: chat-distribuido
spec:
  # NodePort: accesible desde fuera del clúster por un puerto fijo
  # Cambiar a LoadBalancer si el entorno lo soporta
  type: NodePort
  selector:
    app: chat-distribuido
  ports:
  - name: http
    protocol: TCP
    port: 80           # Puerto del Service
    targetPort: 3000   # Puerto del contenedor
    nodePort: 30080    # Puerto expuesto en el nodo (30000-32767)

---
# ── 4. ROUTE (OpenShift/MicroShift) ──────────────────────────
# Equivalente a un Ingress pero nativo de OpenShift
# Expone la app con una URL amigable
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: chat-distribuido-route
  namespace: chat-ha
  labels:
    app: chat-distribuido
spec:
  to:
    kind: Service
    name: chat-distribuido-svc
  port:
    targetPort: http
  # Descomentar para forzar HTTPS:
  # tls:
  #   termination: edge
  #   insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
